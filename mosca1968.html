<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>ИНДАГИНЕ · Mosca 1968</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Courier+Prime:wght@400;700&display=swap');
:root{
  --bg:#0f0707;--bg2:#170a0a;--bg3:#201010;
  --red:#b81414;--red2:#7a0c0c;--red3:#3d0606;
  --text:#ddc9a3;--text2:#a08060;--muted:#5a3a28;
  --border:#2e1010;--border2:#4a1a1a;
  --hilit:#e8a070;--green:#2a5a38;--gtext:#5aaa70;
  --amber:#7a5a10;--abtext:#c8a030;
}
*{box-sizing:border-box;margin:0;padding:0}
html{font-size:18px}
body{background:var(--bg);color:var(--text);font-family:'Playfair Display',Georgia,serif;min-height:100vh;display:flex;justify-content:center;padding:0 16px 60px;background-image:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(180,20,20,.012) 2px,rgba(180,20,20,.012) 4px)}
#app{width:100%;max-width:560px;padding-top:58px}
.s-hdr{font-family:'Courier Prime',monospace;font-size:.72em;letter-spacing:3.5px;text-transform:uppercase;color:var(--red);border-bottom:1px solid var(--red3);padding-bottom:9px;margin-bottom:20px;display:flex;align-items:center;gap:10px}
.s-hdr::before{content:'■';color:var(--red2);font-size:.7em}
.s-body{font-size:.95em;line-height:1.82;margin-bottom:24px}
.s-body p{margin-bottom:13px}.s-body p:last-child{margin-bottom:0}
.s-body ul{margin:8px 0 8px 20px;line-height:2.1}.s-body li{margin-bottom:4px}
.s-body em{font-style:italic;color:var(--text2)}
.hl{color:var(--hilit);font-style:italic}
.dim{color:var(--muted);font-size:.88em;font-style:italic}
.warn-box{border:1px solid var(--red2);padding:14px 16px;margin-bottom:20px;font-size:.85em;line-height:1.7;color:var(--text2)}
.warn-box strong{color:var(--hilit)}
.c-wrap{display:flex;flex-direction:column;gap:7px;margin-bottom:18px}
.choice{background:transparent;border:1px solid var(--border2);color:var(--text);padding:12px 15px;text-align:left;cursor:pointer;font-family:'Playfair Display',Georgia,serif;font-size:.88em;line-height:1.45;transition:background .12s,border-color .12s;width:100%}
.choice:hover:not(:disabled){background:var(--bg3);border-color:var(--red2)}
.choice:disabled{opacity:.35;cursor:not-allowed;font-style:italic;border-style:dashed}
.btn-r{background:var(--red);border:none;color:#fff;padding:13px 22px;cursor:pointer;font-family:'Courier Prime',monospace;font-size:.82em;letter-spacing:2px;text-transform:uppercase;transition:background .12s}
.btn-r:hover{background:var(--red2)}.btn-r.full{width:100%;padding:15px}
.btn-g{background:transparent;border:1px solid var(--border2);color:var(--muted);padding:9px 16px;cursor:pointer;font-family:'Courier Prime',monospace;font-size:.75em;letter-spacing:1.5px;transition:border-color .12s,color .12s}
.btn-g:hover{border-color:var(--text2);color:var(--text2)}
.nav{display:flex;gap:8px;margin-top:18px;padding-top:14px;border-top:1px solid var(--border);flex-wrap:wrap;align-items:center}
.clues-bar{border-top:1px solid var(--border);padding-top:10px;margin-top:6px;font-size:.75em;line-height:1.9;font-family:'Courier Prime',monospace;color:var(--muted)}
.clue{display:inline-block;background:var(--bg3);border:1px solid var(--border2);color:#b07060;padding:1px 8px;margin:2px 3px;letter-spacing:.5px}
.fld{margin-bottom:15px}
.fld label{display:block;font-family:'Courier Prime',monospace;font-size:.68em;letter-spacing:2px;color:var(--muted);margin-bottom:6px;text-transform:uppercase}
.fld input,.fld select{background:var(--bg2);border:1px solid var(--border2);color:var(--text);padding:11px 13px;font-family:'Playfair Display',Georgia,serif;font-size:.9em;width:100%;outline:none}
.fld input:focus{border-color:var(--red2)}.fld select{cursor:pointer}
.logo-wrap{text-align:center;padding:30px 0 28px;border-bottom:1px solid var(--border);margin-bottom:28px}
.logo{font-family:'Courier Prime',monospace;font-size:2.2em;color:var(--red);letter-spacing:8px;margin-bottom:6px}
.logo-sub{font-family:'Courier Prime',monospace;color:var(--muted);font-size:.68em;letter-spacing:3px}
.paper-note{background:var(--bg3);border:1px solid var(--border2);padding:16px 18px;margin:22px 0;font-size:.82em;line-height:1.8;font-family:'Courier Prime',monospace;color:var(--text2)}
.paper-note strong{color:var(--hilit);letter-spacing:.5px}
.opt{display:block;width:100%;background:transparent;border:1px solid var(--border2);color:var(--text);padding:12px 15px;text-align:left;cursor:pointer;font-family:'Playfair Display',Georgia,serif;font-size:.88em;margin-bottom:7px;line-height:1.4;transition:background .12s,border-color .12s}
.opt:hover{background:var(--bg3);border-color:var(--red2)}
.opt.sel{background:var(--red3);border-color:var(--red)}
.opt-role{color:var(--muted);font-size:.85em;display:block;margin-top:2px}
.verdict{border:1px solid var(--border);padding:22px;margin:18px 0;line-height:1.75}
.verdict.ok{border-color:var(--green)}.verdict.ko{border-color:var(--red2)}.verdict.ambig{border-color:var(--amber)}
.v-title{font-family:'Courier Prime',monospace;font-size:.82em;letter-spacing:2px;margin-bottom:14px;text-transform:uppercase}
.verdict.ok .v-title{color:var(--gtext)}.verdict.ko .v-title{color:var(--red)}.verdict.ambig .v-title{color:var(--abtext)}
.verdict p{font-size:.9em;margin-bottom:9px}.verdict p:last-child{margin-bottom:0}
.acc-sec{margin-bottom:20px}
.acc-lbl{font-family:'Courier Prime',monospace;font-size:.65em;letter-spacing:3px;color:var(--muted);margin-bottom:9px;text-transform:uppercase}
.twist-banner{border:1px solid var(--red);padding:14px 16px;margin-bottom:20px;font-family:'Courier Prime',monospace;font-size:.78em;letter-spacing:1px;color:var(--red);text-align:center}
.splash{position:fixed;inset:0;background:rgba(4,0,0,.93);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:1000;animation:splashIn .18s ease}
.splash-emoji{font-size:4.5em;animation:splashBounce .5s ease infinite alternate}
.splash-label{font-family:'Courier Prime',monospace;font-size:.78em;letter-spacing:3px;color:var(--text2);margin-top:16px;text-transform:uppercase;text-align:center;padding:0 24px}
@keyframes splashIn{from{opacity:0}to{opacity:1}}
@keyframes splashBounce{from{transform:scale(1) rotate(-4deg)}to{transform:scale(1.15) rotate(4deg)}}
@keyframes pulseRed{0%,100%{opacity:1}50%{opacity:.4}}
#snd-btn{position:fixed;top:12px;right:12px;z-index:500;background:rgba(8,4,4,.85);border:1px solid var(--border2);color:var(--muted);width:38px;height:38px;border-radius:50%;cursor:pointer;font-size:1.05em;display:flex;align-items:center;justify-content:center;transition:border-color .15s,color .15s;backdrop-filter:blur(4px)}
#snd-btn:hover{border-color:var(--red2);color:var(--text)}
#app>div{animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
@keyframes inkFade{0%{opacity:1}70%{opacity:0.6}100%{opacity:0}}
.reader-badge{font-family:'Courier Prime',monospace;font-size:.68em;letter-spacing:2px;color:var(--muted);text-align:right;margin-bottom:14px;padding-bottom:8px;border-bottom:1px dashed var(--border)}
.reader-badge span{color:#c48060}
.hot-wrap{background:var(--red3);border:2px solid var(--red);padding:20px;margin-bottom:22px;text-align:center}
.hot-title{font-family:'Courier Prime',monospace;font-size:1.15em;letter-spacing:3px;color:var(--red);font-weight:700;margin-bottom:6px;text-transform:uppercase}
.hot-sub{font-size:.8em;color:var(--text2);font-style:italic;letter-spacing:.5px}
.hot-who{font-family:'Courier Prime',monospace;font-size:.78em;letter-spacing:2px;color:var(--muted);margin-bottom:22px;text-align:center;padding:10px;border:1px solid var(--border2)}
.hot-who strong{color:#e8a070;font-size:1.1em}
.vr{color:var(--red);font-weight:700}
.choice.cha{border-color:#2a5a38}.choice.cha:hover:not(:disabled){background:#0a1f0f;border-color:#5aaa70}
.choice.chb{border-color:#5a1010}

/* ── INTRO MOSCA 1968 ─────────────────────────── */
#intro-anim{
  position:fixed;inset:0;
  background:#0a0404;
  display:flex;align-items:center;justify-content:center;
  z-index:999;overflow:hidden;
}
#intro-anim.fade-out{animation:imFadeOut .9s ease-out forwards;}
@keyframes imFadeOut{from{opacity:1;}to{opacity:0;pointer-events:none;}}

/* Sfondo: righe di scansione CRT sovietico */
#intro-anim::before{
  content:'';position:absolute;inset:0;
  background:repeating-linear-gradient(0deg,
    transparent,transparent 3px,
    rgba(180,20,20,.04) 3px,rgba(180,20,20,.04) 4px);
  pointer-events:none;z-index:1;
}

/* Silhouette Piazza Rossa */
.im-piazza{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:760px;
  opacity:0;animation:imRise 2.5s ease-out .4s forwards;
  z-index:2;pointer-events:none;
}
@keyframes imRise{
  from{opacity:0;transform:translateX(-50%) translateY(12px);}
  to{opacity:1;transform:translateX(-50%) translateY(0);}
}

/* Nebbia gelida — più bassa e densa */
.im-fog{position:fixed;inset:0;pointer-events:none;z-index:3;}
.im-fog-l{
  position:absolute;width:200%;height:100%;
  background:radial-gradient(ellipse 80% 35% at 50% 95%,
    rgba(10,4,4,0) 0%,rgba(10,4,4,.6) 50%,rgba(10,4,4,.95) 100%);
  animation:imDrift 22s ease-in-out infinite alternate;
}
.im-fog-l:nth-child(2){animation-duration:30s;animation-direction:alternate-reverse;opacity:.4;}
@keyframes imDrift{from{transform:translateX(-6%);}to{transform:translateX(6%);}}

/* Stella rossa che pulsa */
.im-stella{
  position:fixed;z-index:4;pointer-events:none;
  opacity:0;animation:imStellaIn 1.5s ease-out 2s forwards;
}
@keyframes imStellaIn{from{opacity:0;transform:scale(.5);}to{opacity:1;transform:scale(1);}}
.im-stella svg{animation:imPulse 2.5s ease-in-out infinite alternate;}
@keyframes imPulse{
  from{filter:drop-shadow(0 0 6px rgba(184,20,20,.8));}
  to{filter:drop-shadow(0 0 18px rgba(220,40,40,1)) drop-shadow(0 0 35px rgba(180,20,20,.5));}
}

/* Centro */
.im-center{position:relative;z-index:10;text-align:center;padding:20px;margin-top:-40px;}

.im-pretitle{
  font-family:'Courier Prime',monospace;
  font-size:.55rem;letter-spacing:.45em;text-transform:uppercase;
  color:var(--red2);margin-bottom:12px;
  opacity:0;animation:imFadeUp .8s ease-out 1.6s forwards;
}

.im-title{
  font-family:'Courier Prime',monospace;
  font-size:2.6rem;font-weight:700;letter-spacing:.12em;
  color:var(--red);line-height:1.1;margin-bottom:4px;
  white-space:nowrap;
  text-shadow: 0 0 20px rgba(184,20,20,.6);
}

.im-title-sub{
  font-family:'Courier Prime',monospace;
  font-size:.75rem;letter-spacing:.35em;
  color:var(--red2);margin-bottom:8px;
  opacity:0;animation:imFadeUp .8s ease-out 3.8s forwards;
}

.im-sub{
  font-size:.7rem;letter-spacing:.15em;
  color:var(--muted);font-style:italic;
  margin-bottom:4px;
  opacity:0;animation:imFadeUp .8s ease-out 4.0s forwards;
}

.im-date{
  font-family:'Courier Prime',monospace;
  font-size:.58rem;letter-spacing:.3em;
  color:var(--red2);
  opacity:0;animation:imFadeUp .8s ease-out 4.2s forwards;
  margin-bottom:28px;
}

.im-rule{
  width:0;height:1px;
  background:linear-gradient(to right,transparent,var(--red2),transparent);
  margin:0 auto 22px;
  animation:imRule 1s ease-out 3.6s forwards;
}
@keyframes imRule{from{width:0;}to{width:160px;}}

.im-btn{
  opacity:0;animation:imFadeUp .8s ease-out 4.5s forwards;
  font-family:'Courier Prime',monospace;
  font-size:.65rem;letter-spacing:.25em;text-transform:uppercase;
  padding:11px 30px;background:transparent;
  border:1px solid var(--red2);color:var(--red);
  cursor:pointer;transition:border-color .2s;
}
.im-btn:hover{border-color:var(--red);}

@keyframes imFadeUp{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
@keyframes imCursor{50%{opacity:0;}}

#back-idx{
  position:fixed;bottom:16px;left:16px;
  font-family:'Courier Prime',monospace;
  font-size:.58rem;letter-spacing:.2em;text-transform:uppercase;
  color:var(--muted);background:none;border:none;cursor:pointer;
  opacity:.45;transition:opacity .15s;z-index:50;
  display:none;
}
#back-idx:hover{opacity:1;color:var(--red);}


.im-topsecret{
  font-family:'Courier Prime',monospace;
  font-size:.72rem;font-weight:700;
  letter-spacing:.35em;text-transform:uppercase;
  color:#0a0404;
  border:3px solid #0a0404;
  padding:5px 16px 4px;
  display:inline-block;
  margin-bottom:16px;
  transform:rotate(-5deg);
  opacity:0;
  animation:imStamp .12s ease-out 1.0s forwards;
  background:rgba(180,20,20,.18);
}
@keyframes imStamp{
  0%  {opacity:0;transform:rotate(-5deg) scale(2);}
  70% {opacity:1;transform:rotate(-5deg) scale(.93);}
  100%{opacity:1;transform:rotate(-5deg) scale(1);}
}

.im-emblem{
  display:flex;align-items:center;justify-content:center;
  gap:18px;margin-bottom:8px;
  opacity:0;animation:imFadeUp .8s ease-out 3.5s forwards;
}
.im-emblem svg{
  filter:drop-shadow(0 0 6px rgba(184,20,20,.5));
}
</style>
</head>

function fromSnap(p){S.current=p.scene;S.clues=new Set(p.clues);S.visited=new Set(p.visited);S.flags=Object.assign({},p.flags);}

const SUSPECTS=[

// ── AUDIO ENGINE ─────────────────────────────────────
let audioOn=true;
let actx=null;

function getACtx(){
  if(!actx) actx=new(window.AudioContext||window.webkitAudioContext)();
  if(actx.state==='suspended') actx.resume();
  return actx;
}

function playTap(){
  if(!audioOn) return;
  try{
    const a=getACtx();
    const o=a.createOscillator();
    const g=a.createGain();
    o.connect(g);g.connect(a.destination);
    o.type='sine';o.frequency.setValueAtTime(900,a.currentTime);
    o.frequency.exponentialRampToValueAtTime(400,a.currentTime+0.06);
    g.gain.setValueAtTime(0.18,a.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,a.currentTime+0.08);
    o.start();o.stop(a.currentTime+0.09);
  }catch(e){}
}

function playReveal(){
  if(!audioOn) return;
  try{
    const a=getACtx();
    [0,80,160].forEach((d,i)=>{
      const o=a.createOscillator(),g=a.createGain();
      o.connect(g);g.connect(a.destination);
      const freqs=[440,554,660];
      o.type='triangle';
      o.frequency.setValueAtTime(freqs[i],a.currentTime+d/1000);
      g.gain.setValueAtTime(0,a.currentTime+d/1000);
      g.gain.linearRampToValueAtTime(0.12,a.currentTime+d/1000+0.04);
      g.gain.exponentialRampToValueAtTime(0.001,a.currentTime+d/1000+0.4);
      o.start(a.currentTime+d/1000);
      o.stop(a.currentTime+d/1000+0.45);
    });
  }catch(e){}
}

function playTwist(){
  if(!audioOn) return;
  try{
    const a=getACtx();
    const o=a.createOscillator(),g=a.createGain();
    o.connect(g);g.connect(a.destination);
    o.type='sawtooth';
    o.frequency.setValueAtTime(220,a.currentTime);
    o.frequency.linearRampToValueAtTime(110,a.currentTime+0.3);
    o.frequency.linearRampToValueAtTime(165,a.currentTime+0.55);
    g.gain.setValueAtTime(0.14,a.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,a.currentTime+0.7);
    o.start();o.stop(a.currentTime+0.75);
  }catch(e){}
}

function playDead(){
  if(!audioOn) return;
  try{
    const a=getACtx();
    const o=a.createOscillator(),g=a.createGain();
    o.connect(g);g.connect(a.destination);
    o.type='sine';
    o.frequency.setValueAtTime(180,a.currentTime);
    o.frequency.exponentialRampToValueAtTime(60,a.currentTime+0.9);
    g.gain.setValueAtTime(0.2,a.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,a.currentTime+1.0);
    o.start();o.stop(a.currentTime+1.0);
    // second low thud
    const o2=a.createOscillator(),g2=a.createGain();
    o2.connect(g2);g2.connect(a.destination);
    o2.type='sine';o2.frequency.setValueAtTime(60,a.currentTime+0.15);
    g2.gain.setValueAtTime(0.15,a.currentTime+0.15);
    g2.gain.exponentialRampToValueAtTime(0.001,a.currentTime+0.5);
    o2.start(a.currentTime+0.15);o2.stop(a.currentTime+0.55);
  }catch(e){}
}

function playVerdict(){
  if(!audioOn) return;
  try{
    const a=getACtx();
    const seq=[261,329,392,523];
    seq.forEach((f,i)=>{
      const o=a.createOscillator(),g=a.createGain();

}

// ── AMBIENT ENGINE ───────────────────────────────────
let ambNodes=[];
let ambActive='';
let ambToken={alive:false};
let ambPhrase=0; // phrase counter for variety
// Pick N distinct random players from S.players
function randPlayers(n){
  const pool=[...S.players.map((p,i)=>({nome:p.nome,idx:i}))];
  const out=[];
  while(out.length<n&&pool.length>0){
    const i=Math.floor(Math.random()*pool.length);
    out.push(pool.splice(i,1)[0]);
  }
  // fallback if not enough players
  while(out.length<n) out.push({nome:'Giocatore '+(out.length+1),idx:out.length});
  return out;
}

function stopAmbient(){
  ambToken.alive=false;
  ambNodes.forEach(n=>{try{n.stop();}catch(e){}});
  ambNodes=[];
  ambActive='';
  ambPhrase=0;
}

window.addEventListener('beforeunload',stopAmbient);
document.addEventListener('visibilitychange',()=>{if(document.hidden)stopAmbient();});

function mNote(a,freq,vol,start,dur,type='triangle',dest=null){
  const o=a.createOscillator(), g=a.createGain();
  o.type=type; o.frequency.value=freq;
  o.connect(g); g.connect(dest||a.destination);
  g.gain.setValueAtTime(0,start);
  g.gain.linearRampToValueAtTime(vol,start+Math.min(0.1,dur*0.25));
  g.gain.setValueAtTime(vol,start+dur*0.55);
  g.gain.linearRampToValueAtTime(0,start+dur);
  o.start(start); o.stop(start+dur+0.05);
  ambNodes.push(o);
}

// ── INVESTIGATION — 4 rotating phrases, eerie minor ──────────────
function loopInvestigation(tok){
  if(!tok.alive||!audioOn) return;
  const a=getACtx(), t=a.currentTime;
  const phrases=[
    // phrase 0: descending melancholy
    [[220,0.30,0.40],[293,0.24,0.28],[261,0.28,0.38],[220,0.20,0.50],[196,0.16,0.55]],
    // phrase 1: ascending question
    [[196,0.18,0.32],[220,0.25,0.28],[261,0.30,0.35],[293,0.28,0.42],[330,0.22,0.60]],
    // phrase 2: wandering middle
    [[261,0.26,0.30],[293,0.20,0.25],null,[330,0.28,0.35],[293,0.22,0.28],[261,0.18,0.45],[247,0.14,0.60]],
    // phrase 3: sparse high, lots of silence
    [null,null,[440,0.20,0.25],null,[370,0.16,0.30],null,[330,0.22,0.45],null,[293,0.14,0.55]]
  ];
  const ph=ambPhrase%phrases.length;
  const notes=phrases[ph];
  let off=0;
  notes.forEach(n=>{
    const gap=0.38+Math.random()*0.30;
    if(n){
      const [f,vol,dur]=n;
      mNote(a,f,vol+Math.random()*0.06,t+off,dur,'triangle');
      if(Math.random()>0.65) mNote(a,f*0.5,0.09,t+off+0.05,dur*0.7,'sine');
    }
    off+=gap;
  });
  ambPhrase++;
  const pause=0.7+Math.random()*(ph===3?2.0:1.2);
  setTimeout(()=>loopInvestigation(tok),(off+pause)*1000);
}

// ── INTERROGATION — probing chromatic phrases, denser, mid-range ─
function loopInterrogation(tok){
  if(!tok.alive||!audioOn) return;
  const a=getACtx(), t=a.currentTime;
  // Chromatic phrases — unresolved, searching feeling
  const phrases=[
    // phrase 0: short chromatic climb, pause, repeat
    [[311,0.28,0.22],[330,0.32,0.18],[349,0.26,0.24],[370,0.22,0.38],null,[349,0.20,0.28],[311,0.24,0.45]],
    // phrase 1: low two-voice call and response
    [[220,0.30,0.35],[261,0.24,0.28],null,[246,0.28,0.32],[220,0.32,0.50],null,[196,0.18,0.55]],
    // phrase 2: quick repeated stab then slow release
    [[293,0.35,0.14],[293,0.28,0.12],[293,0.22,0.10],null,[277,0.32,0.40],[261,0.24,0.55],[247,0.16,0.65]],
    // phrase 3: high sparse notes, like questions
    [null,[440,0.22,0.20],null,null,[415,0.26,0.25],null,[392,0.20,0.30],null,[370,0.18,0.50]]
  ];
  const ph=ambPhrase%phrases.length;
  const notes=phrases[ph];
  let off=0;
  notes.forEach(n=>{
    const gap=0.32+Math.random()*0.22;
    if(n){
      const [f,vol,dur]=n;
      mNote(a,f,vol,t+off,dur,'triangle');
      if(Math.random()>0.7) mNote(a,f*1.5,0.08,t+off+0.03,dur*0.6,'sine');
    }
    off+=gap;
  });
  ambPhrase++;
  const pause=0.5+Math.random()*(ph===3?1.8:1.0);
  setTimeout(()=>loopInterrogation(tok),(off+pause)*1000);
}

// ── TENSION — 3 rotating motifs, irregular pulse ─────────────────
function loopTension(tok){
  if(!tok.alive||!audioOn) return;
  const a=getACtx(), t=a.currentTime;
  const motifs=[
    // motif 0: classic climb-and-fall
    [[220,0.32,0.18],[261,0.26,0.16],[293,0.22,0.14],[330,0.38,0.28],[293,0.24,0.20],[261,0.18,0.16]],
    // motif 1: repeated stab, then drop
    [[293,0.40,0.12],[293,0.34,0.10],[293,0.28,0.10],null,[220,0.38,0.30],[196,0.22,0.40]],
    // motif 2: slow two-note tension cell
    [null,[247,0.35,0.45],null,null,[233,0.30,0.55],null,[220,0.18,0.70]]
  ];
  const ph=ambPhrase%motifs.length;
  const notes=motifs[ph];
  let off=0;
  notes.forEach((n,i)=>{
    const step=ph===2?0.55:0.20;
    if(n){
      const[f,vol,dur]=n;
      mNote(a,f,vol,t+off,dur,'sawtooth');
    }
    // pulse thud on beat 0
    if(i===0){
      const o=a.createOscillator(),g=a.createGain();
      o.type='sine'; o.frequency.value=110;
      o.frequency.exponentialRampToValueAtTime(55,t+off+0.16);
      o.connect(g); g.connect(a.destination);
      g.gain.setValueAtTime(0.60,t+off);
      g.gain.exponentialRampToValueAtTime(0.001,t+off+0.20);
      o.start(t+off); o.stop(t+off+0.22);
      ambNodes.push(o);
    }
    off+=n?step:step*0.8;
  });
  ambPhrase++;
  const pause=0.4+Math.random()*(ph===2?1.8:0.9);
  setTimeout(()=>loopTension(tok),(off+pause)*1000);
}

// ── VERDICT — two chord progressions alternating ─────────────────
function loopVerdict(tok){
  if(!tok.alive||!audioOn) return;
  const a=getACtx(), t=a.currentTime;
  const progressions=[
    // Am – F – C – G
    [[220,277,330],[175,220,262],[131,165,196],[196,247,294]],
    // Am – E – Am – Dm
    [[220,277,330],[165,207,247],[220,277,330],[147,175,220]]
  ];
  const prog=progressions[ambPhrase%2];
  const durations=[2.2,1.8,2.0,2.4];
  let off=0;
  prog.forEach((chord,ci)=>{
    const onset=t+off;
    chord.forEach((f,fi)=>{
      mNote(a,f,0.22-fi*0.05,onset+fi*0.06,durations[ci]*0.85,'triangle');
    });
    off+=durations[ci];
  });
  ambPhrase++;
  setTimeout(()=>loopVerdict(tok),(off+1.5)*1000);
}

// ── SETUP — 3 rotating gentle melodies ───────────────────────────
function loopSetup(tok){
  if(!tok.alive||!audioOn) return;
  const a=getACtx(), t=a.currentTime;
  const melodies=[
    [440,0,494,0,523,494,440,392,440,0,0,440],
    [523,494,440,0,392,440,494,0,523,587,523,0],
    [392,440,494,440,0,392,349,392,440,0,494,440]
  ];
  const mel=melodies[ambPhrase%melodies.length];
  let off=0;
  mel.forEach(f=>{
    if(f>0) mNote(a,f,0.17+Math.random()*0.06,t+off,0.32+Math.random()*0.12,'triangle');
    off+=0.44+Math.random()*0.18;
  });
  ambPhrase++;
  setTimeout(()=>loopSetup(tok),(off+1.2+Math.random()*0.8)*1000);
}

function _doStartAmbient(type){
  stopAmbient();
  if(!audioOn) return;
  ambActive=type; ambPhrase=0;
  const tok=ambToken={alive:true};
  if(type==='investigation') setTimeout(()=>loopInvestigation(tok),200);
  else if(type==='interrogation') setTimeout(()=>loopInterrogation(tok),200);
  else if(type==='tension')  setTimeout(()=>loopTension(tok),150);
  else if(type==='verdict')  setTimeout(()=>loopVerdict(tok),100);
  else if(type==='setup')    setTimeout(()=>loopSetup(tok),300);
}

function startAmbient(type){
  if(!audioOn) return;
  const a=getACtx();
  if(a.state==='suspended'){
    a.resume().then(()=>_doStartAmbient(type));
  } else {
    _doStartAmbient(type);
  }
}

function go(id){
  playTap();
  S.history.push(mkSnap());
  S.current=id;
  if(id==='__accusa__'){renderAccusa();return;}
  const def=SC[id];
  if(!def)return;
  if(def.enter)def.enter();
  if(def.splash){
    showSplash(def.splash.emoji, def.splash.label, def.splash.ms||2200, ()=>{
      if(def.hot){renderHotSeat(id);return;}
      nextReader();
      renderScene(id);
    });
    return;
  }
  if(def.biforcata){
    if(S.players.length>1){ renderBiforcata(id); }
    else { if(def.enter)def.enter(); renderHotSeat(id); }
    return;
  }
  if(def.dossier){
    if(def.enter)def.enter();
    renderDossier(id, 0);
    return;
  }
  if(def.hot){
    if(def.timer&&S.players.length>1){
      showTimer(def.timer,def.timerLabel||'Passa il dispositivo',()=>renderHotSeat(id));
    } else {
      renderHotSeat(id);
    }
    return;
  }
  nextReader();
  renderScene(id);
  // Auto-trigger lettera anonima when returning to hub2 after 2+ sub-events
  if(id==='hub2' && !S.visited.has('lettera_vera') && _hub2SubVisited()>=2){
    setTimeout(showLetteraAnonima, 600);
  }
  // If advancing to hub3 while formal docs pending and not yet arrived — lost
  if(id==='hub3' && S.flags.arch_formale && !S.flags.arch_doc_arrivati){
    if(S.flags._arch_timer){ clearTimeout(S.flags._arch_timer); S.flags._arch_timer=null; }
    S.flags.arch_doc_arrivati=true; // mark as lost
    setTimeout(showDocumentiPersi, 800);
  }
}

function renderScene(id){
  const def=SC[id];

    const dis=c.disabled?'disabled':'';
    const act=c.delay
      ?`onclick="goDelayed('${c.goto}',this)"`
      :`onclick="go('${c.goto}')"`;
    return`<button class="choice ${c.cls||''}" ${dis} ${act}>${c.lbl?c.lbl():c.text}</button>`;
  }).join('');
  const rdr=S.players.length>1?`<div class="reader-badge">Legge: <span>${readerName()}</span></div>`:'';
  const rst=`<div style="margin-top:32px;padding-top:16px;border-top:1px dashed var(--border);text-align:center"><button class="btn-g" onclick="confirmRestart()">↺ Ricomincia da capo</button></div><div style="margin-top:24px;text-align:center;font-family:'Courier Prime',monospace;font-size:.6em;letter-spacing:2px;color:var(--muted);padding-bottom:8px">Gioco creato da Andrea Zullo</div>`;
  app.innerHTML=`<div>${rdr}<div class="s-hdr">${def.title}</div><div class="s-body">${def.text()}</div><div class="c-wrap">${btns}</div>${rst}</div>`;

  const interrogationIds=['hub2','hub_irina','hub_cheskov','hub_vera','hub_petrov','hub_barinov','hub_zhuk','irina_alibi','irina_num','irina_ag','irina_micro','cheskov_lett','cheskov_ric','cheskov_al','vera_prima','vera_min','vera_ass','vera_telefono','petrov_scena','petrov_autopsia','petrov_contatto','zhuk_sera','zhuk_irina','barinov_micro','barinov_app','arch_inf','arch_form','arch_scelta','cheskov_promosso','commissariato','lettera_vera'];
  const ambType=tensionIds.includes(id)?'tension':interrogationIds.includes(id)?'interrogation':'investigation';
  window._ambientType=ambType;
  startAmbient(ambType);
  scroll();
}

function renderHotSeat(id){
  const def=SC[id];
  // show pass-screen first
  const nextNm=S.players.length>1?S.players[rdrIdx%S.players.length].nome:null;
  const passHtml=nextNm?`<div class="hot-who">Passa il dispositivo a<br><strong>${nextNm}</strong></div>`:'';
  const ch=def.choices?def.choices():[];

  const rst=`<div style="margin-top:32px;padding-top:16px;border-top:1px dashed var(--border);text-align:center"><button class="btn-g" onclick="confirmRestart()">↺ Ricomincia da capo</button></div><div style="margin-top:24px;text-align:center;font-family:'Courier Prime',monospace;font-size:.6em;letter-spacing:2px;color:var(--muted);padding-bottom:8px">Gioco creato da Andrea Zullo</div>`;

// ── DOSSIER SEQUENCE ──────────────────────────────────
// phase 0: pass to player A; phase 1: A reads (fading); phase 2: pass to B; phase 3: B reads (fading); phase 4: discuss
function renderDossier(id, phase){
  const def=SC[id];
  // pick random pair once (phase 0), reuse stored for subsequent phases
  if(phase===0){
    const _rp=randPlayers(2);
    S.flags._dosA=_rp[0].nome;
    S.flags._dosB=_rp[1].nome;
  }
  const pA=S.flags._dosA||'Giocatore 1';
  const pB=S.flags._dosB||'Giocatore 2';
  const rst='<div style="margin-top:32px;padding-top:16px;border-top:1px dashed var(--border);text-align:center"><button class="btn-g" onclick="confirmRestart()">↺ Ricomincia da capo</button></div>';

  if(phase===0){
    // Pass to A
    app.innerHTML='<div class="pass-wrap"><div class="pass-stars">★ ★ ★</div><div class="pass-lbl">Prima parte del fascicolo</div><div class="pass-nm">'+pA+'</div><div class="pass-note">Leggi da solo in silenzio.<br>Gli altri girano lo sguardo.<br><br><strong style="color:var(--red)">Hai solo 18 secondi.</strong><br>Poi l\'inchiostro svanisce.</div><button class="btn-r" onclick="renderDossier(\''+id+'\',1)">Sono pronto →</button>'+rst+'</div>';
    scroll();
  }
  else if(phase===1){
    // A reads — text fades over 30s
    const txt=def.textA?def.textA():'';
    app.innerHTML='<div style="padding-top:52px"><div class="s-hdr">'+def.title+'</div><div class="s-body" id="dos-txt" style="transition:opacity 18s linear;opacity:1">'+txt+'</div>'+rst+'</div>';
    // fixed countdown badge
    const badge=document.createElement('div');
    badge.id='dos-cnt-wrap';
    badge.style.cssText='position:fixed;top:12px;left:12px;z-index:600;background:rgba(8,4,4,.9);border:1px solid var(--red2);border-radius:50%;width:44px;height:44px;display:flex;align-items:center;justify-content:center;font-family:\'Courier Prime\',monospace;font-size:1.05em;font-weight:700;color:var(--red);backdrop-filter:blur(4px)';
    badge.textContent='18';
    document.body.appendChild(badge);
    scroll();
    // start fade
    setTimeout(()=>{ const t=document.getElementById('dos-txt'); if(t) t.style.opacity='0'; },100);
    let n=18;
    const tick=setInterval(()=>{
      n--; playTap();
      const el=document.getElementById('dos-cnt-wrap');
      if(el) el.textContent=n;
      if(n<=0){ clearInterval(tick); const b=document.getElementById('dos-cnt-wrap'); if(b)b.remove(); renderDossier(id,2); }
    },1000);
  }
  else if(phase===2){
    // Pass to B
    app.innerHTML='<div class="pass-wrap"><div class="pass-stars">★ ★ ★</div><div class="pass-lbl">Seconda parte del fascicolo</div><div class="pass-nm">'+pB+'</div><div class="pass-note">Leggi da solo in silenzio.<br>'+pA+' gira lo sguardo.<br><br><strong style="color:var(--red)">Hai solo 18 secondi.</strong><br>Poi l\'inchiostro svanisce.</div><button class="btn-r" onclick="renderDossier(\''+id+'\',3)">Sono pronto →</button>'+rst+'</div>';
    scroll();
  }
  else if(phase===3){
    // B reads — text fades
    const txt=def.textB?def.textB():'';
    app.innerHTML='<div style="padding-top:52px"><div class="s-hdr">'+def.title+'</div><div class="s-body" id="dos-txt" style="transition:opacity 18s linear;opacity:1">'+txt+'</div>'+rst+'</div>';
    // fixed countdown badge
    const badge=document.createElement('div');
    badge.id='dos-cnt-wrap';
    badge.style.cssText='position:fixed;top:12px;left:12px;z-index:600;background:rgba(8,4,4,.9);border:1px solid var(--red2);border-radius:50%;width:44px;height:44px;display:flex;align-items:center;justify-content:center;font-family:\'Courier Prime\',monospace;font-size:1.05em;font-weight:700;color:var(--red);backdrop-filter:blur(4px)';
    badge.textContent='18';
    document.body.appendChild(badge);
    scroll();
    setTimeout(()=>{ const t=document.getElementById('dos-txt'); if(t) t.style.opacity='0'; },100);
    let n=18;
    const tick=setInterval(()=>{
      n--; playTap();
      const el=document.getElementById('dos-cnt-wrap');
      if(el) el.textContent=n;
      if(n<=0){ clearInterval(tick); const b=document.getElementById('dos-cnt-wrap'); if(b)b.remove(); renderDossier(id,4); }
    },1000);
  }
  else if(phase===4){
    // Discuss
    app.innerHTML='<div class="pass-wrap"><div class="pass-stars">💬</div><div class="pass-lbl">Confrontatevi</div><div class="pass-nm" style="font-size:1.2em">Cosa avete letto?</div><div class="pass-note">Nessuno rilegge. Solo a voce.<br>Prendete nota su carta.<br><br>Chi è ОЛГА? Cosa stava raccogliendo?<br>E per conto di chi?</div><button class="btn-r" onclick="go(\'hub2\')" style="margin-top:24px">← Tornare alle indagini</button>'+rst+'</div>';
    scroll();
  }
}

sc('irina_alibi',{

sc('irina_olga',{

sc('vera_min',{
  title:'I Rapporti al Ministero',
  enter:()=>S.visited.add('vera_min'),
  text:()=>`<p>Alla domanda sui rapporti di Viktor al Ministero, Vera si irrigidisce. Le dita si muovono sul braccio della sedia.</p>
<p>"So che aveva una collega. Irina qualcosa." Una pausa. "Si vedevano spesso — anche fuori dall'orario. Viktor diceva che era 'professionale'. Io non gli ho mai creduto."</p>
<p>Si alza, va alla finestra, le spalle voltate. "Sa cosa mi ha detto l'ultima volta che l'ho visto? Che presto tutto sarebbe cambiato. Non ho capito cosa intendesse. Adesso forse sì."</p>

  choices:()=>[{text:'← Vera',goto:'hub_vera'}]
});

sc('vera_ass',{
  title:'La Polizza Assicurativa',
  enter:()=>{S.clues.add('c_vera');S.visited.add('vera_ass');},
  text:()=>`<p>Alla parola "polizza" Vera si blocca. Un momento. Poi comincia a parlare troppo velocemente.</p>
<p>"Sì. 4.000 rubli. L'abbiamo stipulata quando ci siamo sposati — non l'abbiamo mai cambiata perché non ci siamo mai davvero separati formalmente, capisce? Non è che non volessimo, era solo..." Si interrompe.</p>
<p>"Non è quello che pensate. 4.000 rubli non valgono vent'anni di matrimonio." Lo dice come se avesse già immaginato questa conversazione. Come se avesse già preparato la risposta.</p>
<p>Poi, più piano, quasi a sé stessa: "Non valevano."</p>`,
  choices:()=>[{text:'← Vera',goto:'hub_vera'}]
});

sc('vera_telefono',{
  title:'Telefonata a Vera Sokolova',
  enter:()=>{S.visited.add('vera_tel');S.visited.add('vera_documenti');},
  text:()=>`<p>Il telefono squilla due volte. Risponde al secondo.</p>
<div style="background:#0e0e0e;border:1px solid #2a2a2a;padding:14px 16px;margin:16px 0;font-family:'Courier Prime',monospace;font-size:.82em;line-height:2.1;color:#aaa">
  <div style="font-size:.6em;letter-spacing:2px;color:#555;margin-bottom:8px">📞 CHIAMATA IN CORSO — VIA GORKY 44</div>
  <div><span style="color:#666">Voi:</span> <em>"Signora Sokolova, sappiamo che Viktor teneva dei documenti riservati a casa. Sa dove si trovano?"</em></div>
  <div style="margin-top:6px"><span style="color:#666">Vera:</span> <em>"Non lo so."</em></div>
  <div style="margin-top:6px"><span style="color:#666">Voi:</span> <em>"Era sua moglie. Non ha mai visto nulla di insolito?"</em></div>
  <div style="margin-top:6px"><span style="color:#666">Vera:</span> <em>"Viktor aveva molte cose che non condivideva con me. L'ho accettato da molto tempo."</em></div>
  <div style="margin-top:6px"><span style="color:#666">Voi:</span> <em>"Qualcuno ci ha indirizzati da lei. Dice che lei sa."</em></div>
  <div style="margin-top:6px"><span style="color:#666">Vera:</span> <em>"Allora quella persona vi sta mentendo. O vi sta usando."</em> Pausa esatta di tre secondi. <em>"Buonasera."</em></div>
</div>
<p>Tre secondi di pausa — non di esitazione. Di calcolo. Al telefono Vera è diversa: niente mani che stringono le porte, niente frasi in più, niente occhi lucidi. Solo risposte brevi, precise, senza una parola di troppo.</p>
<p>Di persona sembrava spaventata. Al telefono sembra preparata. E non si sa quale delle due sia più preoccupante.</p>`,
  choices:()=>[{text:'← Indagini',goto:'hub2'}]
});

function renderAccusa(){
  const ok=provable();
  const warn=!ok?`<div class="verdict ambig"><div class="v-title">⚠ Prove Insufficienti</div><p>Non avete ancora prove sufficienti per un'accusa solida. Potete procedere, ma rischiate una conclusione sbagliata.</p></div>`:'';
  const sl=SUSPECTS.map(s=>`<button class="opt${accSusp===s.id?' sel':''}" onclick="selS('${s.id}')">${s.name}<span class="opt-role">${s.role}</span></button>`).join('');
  const ml=accSusp?MOTIVES[accSusp].map(m=>`<button class="opt${accMot===m?' sel':''}" onclick="selM(this)">${m}</button>`).join(''):`<p class="dim">Selezionare prima un sospettato.</p>`;
  const bk=`<button class="btn-g" onclick="confirmRestart()">↺ Ricomincia da capo</button>`;
  app.innerHTML=`<div>
    <div class="s-hdr">Accusa Finale</div>
    <div class="s-body"><p>Chi ha ucciso Viktor Sokolov? E per quale ragione?</p><p class="dim">Confrontatevi, usate i vostri appunti su carta, poi decidete insieme.</p></div>
    ${warn}
    <div class="acc-sec"><div class="acc-lbl">Sospettato</div>${sl}</div>
    <div class="acc-sec"><div class="acc-lbl">Movente</div><div id="mw">${ml}</div></div>
    <div class="c-wrap" style="margin-top:20px"><button class="choice" id="bacc" onclick="conferma(this)" ${(!accSusp||!accMot)?'disabled':''}>⚖️ Confermare l'accusa</button></div>
    <div style="margin-top:32px;padding-top:16px;border-top:1px dashed var(--border);text-align:center">${bk}</div>
  <div style="margin-top:24px;text-align:center;font-family:'Courier Prime',monospace;font-size:.6em;letter-spacing:2px;color:var(--muted);padding-bottom:8px">Gioco creato da Andrea Zullo</div>
  </div>`;
  window._ambientType='tension';
  startAmbient('tension');
  scroll();
}

function selS(id){
  accSusp=id;accMot=null;
  document.getElementById('mw').innerHTML=MOTIVES[id].map(m=>`<button class="opt" onclick="selM(this)">${m}</button>`).join('');
  document.querySelectorAll('.acc-sec .opt').forEach(el=>el.classList.remove('sel'));
  document.querySelectorAll('.acc-sec .opt').forEach(el=>{if(el.textContent.startsWith(SUSPECTS.find(s=>s.id===id).name))el.classList.add('sel');});
  document.getElementById('bacc').disabled=true;
}
function selM(el){
  accMot=el.textContent;
  document.getElementById('mw').querySelectorAll('.opt').forEach(o=>o.classList.remove('sel'));
  el.classList.add('sel');
  document.getElementById('bacc').disabled=false;
}
function conferma(btn){
  if(!accSusp||!accMot)return;
  if(btn){
    document.querySelectorAll('.opt,.choice').forEach(b=>{b.disabled=true;b.style.opacity='.35';});
    btn.style.opacity='1';
    btn.style.animation='pulseRed 0.7s ease infinite';
  }
  setTimeout(()=>{
    showSplash('⚖️','Il verdetto...', 2000, ()=>{
      S.history.push(mkSnap());
      renderVerdetto();
    });
  }, btn?3200:0);
}

function renderVerdetto(){
  const nm=SUSPECTS.find(s=>s.id===accSusp).name;
  const ck=accSusp===TRUE_KILLER;
  const cm=accMot===TRUE_MOTIVE;
  let vhtml='';
  if(ck&&cm){
    vhtml=`<div class="verdict ok"><div class="v-title">✓ Caso Risolto</div>
    <p><strong>Irina Volkova</strong> era un'agente infiltrata — reclutata anni prima, inserita nel Ministero con una copertura perfetta. Sokolov aveva cominciato a documentarla senza dirle nulla. Il microfilm era la prova.</p>
    <p>La sera del 22 ottobre si è recata nell'appartamento con il pretesto di un incontro di lavoro e ha somministrato il Fenobarbital nel bicchiere. Poi ha chiamato Petrov, ha chiamato Zhuk, e se n'è andata.</p>
    <p>Irina sarà processata dal tribunale militare. Il processo non sarà pubblico. Voi verrete ringraziati e probabilmente trasferiti. Lontano.</p></div>`;
  } else if(ck&&!cm){
    vhtml=`<div class="verdict ambig"><div class="v-title">~ Parzialmente Corretto</div>
    <p>Avete identificato <strong>Irina Volkova</strong>, ma il movente indicato non era quello reale. Irina non agiva per ragioni personali: era un'agente in servizio. Il caso viene chiuso — ma la rete rimane operativa.</p></div>`;
  } else if(accSusp==='cheskov'){
    const alibiCrepa=S.clues.has('c_cheskov_tardi');
    vhtml=`<div class="verdict ko"><div class="v-title">✗ Accusa Sbagliata</div>
    <p><strong>Cheskov</strong> aveva un movente potente${alibiCrepa?' e il suo alibi aveva una crepa reale':' ma quella sera era al Ministero — riunione con quattro testimoni'}. ${alibiCrepa?"L'ora mancante non è sufficiente a provare l'omicidio — e non c'è nessun'altra prova che lo collochi nell'appartamento.":'Viene interrogato, umiliato, rilasciato.'}${S.visited.has('cheskov_promosso')?' La promozione ottenuta è reale — ma non è una prova.':''}</p>
    <p>Il vero assassino è ancora a piede libero. Ora sa che avete sbagliato strada.</p></div>`;
  } else if(accSusp==='barinov'){
    vhtml=`<div class="verdict ko"><div class="v-title">✗ Accusa Sbagliata</div>
    <p><strong>Barinov</strong> voleva Sokolov fermato, non ucciso. L'appunto del 18 ottobre era un ordine di sorveglianza, non di eliminazione. Accusare un funzionario KGB senza prove dirette ha conseguenze — per voi.</p></div>`;
  } else if(accSusp==='vera'){
    vhtml=`<div class="verdict ko"><div class="v-title">✗ Accusa Sbagliata</div>
    <p><strong>Vera Sokolova</strong> aveva un movente economico e anni di risentimento accumulato. Ma la sera del 22 ottobre era a cena con la sorella a Leningrado — due testimoni e un biglietto ferroviario lo confermano.</p>
    <p>La polizza da 4.000 rubli è reale. La colpa, no.</p></div>`;
  } else if(accSusp==='petrov'){
    vhtml=`<div class="verdict ko"><div class="v-title">✗ Accusa Sbagliata</div>
    <p><strong>Petrov</strong> ha firmato un referto falso — è complice dopo il fatto. Ma non era nell'appartamento quella sera. Verrà sospeso dall'ordine, ma non condannato per omicidio.</p>
    <p>Chi ha convinto Petrov a mentire è ancora libero.</p></div>`;
  } else if(accSusp==='zhuk'){
    vhtml=`<div class="verdict ko"><div class="v-title">✗ Accusa Sbagliata</div>
    <p><strong>Zhuk</strong> era fuori dall'edificio come autista, non come assassino. Ha aspettato Irina, l'ha portata via. Complice indiretto, forse inconsapevole della gravità. Non ha ucciso nessuno.</p></div>`;
  }
  const restart=`<button class="btn-r full" style="margin-top:18px" onclick="restartGame()">↺ Nuova partita</button>`;
  app.innerHTML=`<div>
    <div class="s-hdr">Mosca, 24 Ottobre 1968</div>
    <div class="s-body"><p>Accusa: <strong>${nm}</strong><br><em>${accMot}</em></p></div>
    ${vhtml}
    ${restart}
  <div style="margin-top:24px;text-align:center;font-family:'Courier Prime',monospace;font-size:.6em;letter-spacing:2px;color:var(--muted);padding-bottom:8px">Gioco creato da Andrea Zullo</div>
  </div>`;
  window._ambientType='verdict';
  startAmbient('verdict');
  scroll();
}

// ════ SETUP ═══════════════════════════════════════════
function renderSetup(){
  accSusp=null;accMot=null;
  // ensure sound button
  if(!document.getElementById('snd-btn')){
    const b=document.createElement('button');
    b.id='snd-btn';b.title='Suono on/off';
    b.textContent='🔊';b.onclick=toggleSound;
    document.body.appendChild(b);
  }
  app.innerHTML=`<div>
    <div class="logo-wrap">
      <div class="logo">ИНДАГИНЕ</div>
      <div class="logo-sub">Mosca — Ottobre 1968</div>
      <div style="color:var(--muted);font-size:.72em;margin-top:6px;font-family:'Courier Prime',monospace;letter-spacing:1px">Un'indagine in Guerra Fredda</div>
      <div style="display:flex;gap:10px;justify-content:center;margin-top:16px;flex-wrap:wrap">
        <div style="border:1px solid var(--border2);padding:7px 16px;font-family:'Courier Prime',monospace;font-size:.7em;letter-spacing:2px;color:var(--text2);display:flex;align-items:center;gap:7px">
          <span>👥</span><span>2 – 4 giocatori</span>
        </div>
        <div style="border:1px solid var(--red2);padding:7px 16px;font-family:'Courier Prime',monospace;font-size:.7em;letter-spacing:2px;color:var(--red);display:flex;align-items:center;gap:7px">
          <span>⚠</span><span>Difficoltà: Media</span>
        </div>
      </div>
    </div>
    <div class="fld">
      <label>Numero di giocatori</label>
      <select id="npl" onchange="aggForm()">
        <option value="2">2 giocatori</option>
        <option value="3">3 giocatori</option>
        <option value="4">4 giocatori</option>
      </select>
    </div>
    <div id="nw"></div>
    <div class="paper-note">
      📋 <strong>Procurate carta e penna.</strong><br>
      Durante l'indagine raccoglierete nomi, orari e connessioni. L'app non tiene traccia di tutto — dovete farlo voi.<br>
      <span style="color:var(--muted)">Chi indovina assassino <em>e</em> movente vince.</span>
    </div>
    <div style="border:1px solid var(--border2);padding:13px 16px;margin-bottom:18px;font-size:.82em;line-height:1.7;font-family:'Courier Prime',monospace;color:var(--text2)">
      ⚠ <strong style="color:var(--hilit)">Le scelte influenzano l'andamento delle indagini.</strong><br>
      Alcune porte si chiudono. Alcuni testimoni spariscono. Decidete con attenzione.
    </div>
    <button class="btn-r full" onclick="avvia()">Iniziare l'indagine →</button>
    <div style="margin-top:16px;text-align:center;color:var(--muted);font-size:.75em;font-family:'Courier Prime',monospace;line-height:1.9;border-top:1px solid var(--border);padding-top:14px">
      Tre fasi di indagine · sei sospettati · un colpo di scena<br>La verità è raggiungibile solo raccogliendo le prove giuste
    </div>
  </div>`;
  aggForm();
}

function aggForm(){
  const n=parseInt(document.getElementById('npl').value);
  let h='';
  for(let i=0;i<n;i++)h+=`<div class="fld"><label>Nome giocatore ${i+1}</label><input id="nm${i}" type="text" placeholder="Nome..." maxlength="24"></div>`;
  document.getElementById('nw').innerHTML=h;
}

function avvia(){
  const n=parseInt(document.getElementById('npl').value);
  S.players=[];
  for(let i=0;i<n;i++){const v=(document.getElementById('nm'+i).value||'').trim();S.players.push({nome:v||`Giocatore ${i+1}`});}
  S.clues=new Set();S.visited=new Set();S.flags={};S.history=[];S.current='intro';
  accSusp=null;accMot=null;
  renderScene('intro');
}

function restartGame(){
  if(S.flags&&S.flags._arch_timer) clearTimeout(S.flags._arch_timer);
  S.players=[];S.clues=new Set();S.visited=new Set();S.flags={};S.history=[];S.current=null;
  accSusp=null;accMot=null;
  renderSetup();
}

renderSetup();

// Stop audio when page is closed or hidden
window.addEventListener('beforeunload',()=>{stopAmbient();if(actx)actx.close();});
document.addEventListener('visibilitychange',()=>{
  if(document.hidden){ stopAmbient();if(actx)actx.suspend(); }
  else if(audioOn&&window._ambientType){ actx&&actx.resume().then(()=>startAmbient(window._ambientType)); }
});
</script>
<script>
(function(){
  // Typewriter cirillico
  const testo = 'ИНДАГИНЕ';
  const el = document.getElementById('im-typed');
  let i = 0;
  if(el){
    setTimeout(function _t(){
      if(i < testo.length){
        el.textContent = testo.slice(0, ++i);
        setTimeout(_t, 180);
      } else {
        setTimeout(()=>{
          const cur = document.getElementById('im-cursor');
          if(cur) cur.style.display = 'none';
        }, 2500);
      }
    }, 1800);
  }
})();

function avviaGioco(){
  const intro = document.getElementById('intro-anim');
  if(intro){
    intro.classList.add('fade-out');
    setTimeout(()=>{
      intro.style.display = 'none';
      const app = document.getElementById('app');
      if(app) app.style.display = '';
      const bk = document.getElementById('back-idx');
      if(bk) bk.style.display = 'block';
    }, 900);
  }
}
</script>
